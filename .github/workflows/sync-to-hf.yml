name: Sync Backend to HF Space

on:
  push:
    branches: [main]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://devanshikdesai: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 HEAD:main --force