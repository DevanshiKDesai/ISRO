name: Sync to HF Space

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Push backend subfolder to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd GeoDristri
          git init
          git lfs install
          git lfs track "*.joblib" "*.csv" "*.xlsx"
          git add .gitattributes
          git add .
          git commit -m "deploy from GitHub ${{ github.sha }}"
          git push https://devanshikdesai:$HF_TOKEN@huggingface.co/spaces/GeoDrishti/GeoDrishti HEAD:main --force